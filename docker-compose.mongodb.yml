services:
  mongo:
    image: mongo:7
    container_name: thriftapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: thrift_admin
      MONGO_INITDB_ROOT_PASSWORD: change_me_now
      MONGO_INITDB_DATABASE: thriftapp
    volumes:
      - thriftapp_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: thriftapp-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: thrift_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: change_me_now
      ME_CONFIG_MONGODB_URL: mongodb://thrift_admin:change_me_now@mongo:27017/

volumes:
  thriftapp_mongo_data:
